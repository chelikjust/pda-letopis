<script>
function updateTime() {
  const now = new Date();

  let hours = now.getHours().toString().padStart(2, '0');
  let minutes = now.getMinutes().toString().padStart(2, '0');

  document.getElementById("time").textContent = hours + ":" + minutes;
}

setInterval(updateTime, 1000);
updateTime();
</script>
